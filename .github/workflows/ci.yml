name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git clone --depth 1 https://github.com/kotoba-lang/html.git ../html
      - run: git clone --depth 1 https://github.com/kotoba-lang/css.git ../css
      # kotoba.securities.pricing's optional cross-reference into
      # cloud-itonami-isic-6311, which itself needs kotoba-lang/langgraph
      # at ../../kotoba-lang/langgraph relative to ITS OWN deps.edn --
      # both paths below are relative to THIS repo's checkout dir, one/two
      # levels up (mirroring how ../html / ../css above line up with
      # ../../cloud-itonami / ../../kotoba-lang being siblings of the
      # default GH Actions checkout parent).
      - run: mkdir -p ../../cloud-itonami && git clone --depth 1 https://github.com/cloud-itonami/cloud-itonami-isic-6311.git ../../cloud-itonami/cloud-itonami-isic-6311
      - run: mkdir -p ../../kotoba-lang && git clone --depth 1 https://github.com/kotoba-lang/langgraph.git ../../kotoba-lang/langgraph
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - run: clojure -M:test
